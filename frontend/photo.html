<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>photo++</title>
  <link rel="icon" type="image/svg+xml" href="/photo-logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" />
  <link rel="stylesheet" href="/photo.css?v=3" />
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>
  <a class="back-to-portfolio" href="/">← igorprojects</a>

  <header class="brand">photo<span class="plus">++</span></header>

  <main class="container">
    <aside class="panel">
      <div class="filters" role="tablist">
        <button class="filter-btn active" data-filter="none" type="button">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="9"/>
            <circle cx="12" cy="12" r="2.5" fill="currentColor" stroke="none"/>
          </svg>
          <span>Норма</span>
        </button>
        <button class="filter-btn" data-filter="shakal" type="button">
          <svg viewBox="0 0 14 14" width="16" height="16" fill="currentColor" aria-hidden="true">
            <rect x="0" y="0" width="3" height="3"/>
            <rect x="4" y="0" width="3" height="3"/>
            <rect x="11" y="0" width="3" height="3"/>
            <rect x="0" y="4" width="3" height="3"/>
            <rect x="8" y="4" width="3" height="3"/>
            <rect x="4" y="8" width="3" height="3"/>
            <rect x="11" y="8" width="3" height="3"/>
            <rect x="0" y="11" width="3" height="3"/>
            <rect x="8" y="11" width="3" height="3"/>
          </svg>
          <span>Шакал</span>
        </button>
        <button class="filter-btn" data-filter="face" type="button">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <path d="M3 8V5a2 2 0 0 1 2-2h3"/>
            <path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
            <path d="M3 16v3a2 2 0 0 0 2 2h3"/>
            <path d="M21 16v3a2 2 0 0 1-2 2h-3"/>
            <circle cx="12" cy="12" r="1.6" fill="currentColor" stroke="none"/>
          </svg>
          <span>Лицо</span>
        </button>
      </div>

      <div class="slider-group">
        <div class="slider-row">
          <span class="label">яркость рамки</span>
          <span class="val" id="brightnessVal">50</span>
        </div>
        <input type="range" id="brightnessSlider" min="0" max="100" value="50" />
      </div>

      <div class="slider-group">
        <div class="slider-row">
          <span class="label">оттенок</span>
          <span class="val" id="tempVal">0</span>
        </div>
        <input type="range" id="tempSlider" min="-100" max="100" value="0" class="temp" />
        <div class="temp-labels">
          <span>холодный</span>
          <span>тёплый</span>
        </div>
      </div>

      <button class="capture-btn" id="capture" type="button">
        <span class="dot"></span><span>Снимок</span>
      </button>
    </aside>

    <div class="camera-frame" id="frame" style="--brightness: 50">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div id="status" class="status">Запрашиваем доступ к камере...</div>
    </div>
  </main>

  <script src="/photo.js?v=3"></script>
</body>
</html>
